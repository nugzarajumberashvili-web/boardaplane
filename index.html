<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FlyEasy ✈️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <h2 id="logo">✈️ FlyEasy</h2>

  <div id="nav">
    <button onclick="openAuth()">Login</button>
  </div>
</div>

<div class="hero">
  <h1 id="heroText">Book flights worldwide 🌍</h1>
</div>

<div class="search">

  <select id="from">
    <option>Tbilisi</option>
    <option>Batumi</option>
      <option>Paris</option>
      <option>Dubai</option>
      <option>Tokyo</option>
      <option>Rome</option>
      <option>Russia</option>
    </option>
  </select>

  <select id="to">
    <option>Paris</option>
    <option>Dubai</option>
    <option>Tokyo</option>
    <option>Rome</option>
    <option>Tbilisi</option>
    <option>Batumi</option>
    <option>Russia</option>
  </select>

  <input type="date" id="date">

  <button onclick="search()">Search ✈️</button>

</div>

<div id="results"></div>
<div id="auth" class="auth hidden">
  <div class="box">

    <div class="tabs">
      <button onclick="switchAuth('login')" id="loginTab">Login</button>
      <button onclick="switchAuth('register')" id="registerTab">Register</button>
    </div>

    <h3 id="title">Login</h3>

    <input id="name" placeholder="Name (register only)">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="auth()">Continue</button>
    <button onclick="closeAuth()">Close</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
